<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
</head>
<body>
    <h1>pyburger의 햄버거 검색화면입니다</h1>
    <div>
      <form methon="GET">
        <input type="text" name="keyword">
        <button type="submit">검색</button>
      </form>
    </div>
    <h2>검색결과</h2>
    {% for burgers in burgers %}
        <div>
          {{ burgers.name }}
          (가격: {{ burgers.price }}원,
          칼로리: {{ burgers.calories }}kcal)
        </div>
    {% endfor %}
</body>
</html>
