<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
    <h1>pyburger search</h1>
    <div>
        <form method="GET">
            <input type="text" name="keyword">
            <button type="submit">search</button>
        </form>
    </div>
    <h2>result</h2>
    {% for burger in burgers %}
      <div>
        {{ burger.name }}
        (price: {{ burger.price }}
        calories: {{ burger.calories }})
      </div>
    {% endfor %}
</body>
</html>
